<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Responsive Hero Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="#" class="logo">MyBrand</a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">

    <div class="hero-text">
      <h1>Build Something <span>Amazing</span> Today</h1>
      <p>
        A simple, clean landing page built with Flexbox.
        It works great on both desktop and mobile screens.
      </p>
      <div class="hero-buttons">
        <a href="#" class="btn-primary">Get Started</a>
        <a href="#" class="btn-secondary">Learn More</a>
      </div>
    </div>

    <div class="hero-image">
      <img
        src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800&auto=format&fit=crop"
        alt="Person working on laptop"
      />
    </div>

  </section>

</body>
</html>
